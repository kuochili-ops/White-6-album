<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六分享相簿 APP</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { background-color: #00b900; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; margin: 10px; }
        #album-list { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .album-item { background: #333; padding: 15px; margin: 5px; border-radius: 10px; width: 80%; max-width: 400px; cursor: pointer; }
        .error { color: #ffcc00; background: #222; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>𓃥 白六分享相簿</h1>
    <p>請登入 Google 以讀取您的相簿目錄</p>

    <button class="btn" onclick="login()">登入 Google 帳號</button>
    
    <div id="status"></div>
    <div id="album-list"></div>

    <script>
        let accessToken = '';
        const CLIENT_ID = '您的用戶端ID.apps.googleusercontent.com'; // <--- 請換成您的 Client ID

        // 初始化 Token Client
        const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            // 這裡必須包含完整的相簿讀取權限
            scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
            callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                    accessToken = tokenResponse.access_token;
                    document.getElementById('status').innerHTML = '<p style="color: #00ff00;">已成功連線！請選擇相簿：</p>';
                    fetchAlbums();
                }
            },
        });

        function login() {
            // 重點：加上 prompt: 'consent' 強制跳出勾選視窗
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        async function fetchAlbums() {
            try {
                const response = await fetch('https://photoslibrary.googleapis.com/v1/albums?pageSize=50', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                const data = await response.json();
                const albumListDiv = document.getElementById('album-list');
                albumListDiv.innerHTML = '';

                if (data.albums && data.albums.length > 0) {
                    data.albums.forEach(album => {
                        const div = document.createElement('div');
                        div.className = 'album-item';
                        div.innerText = `${album.title} (${album.mediaItemsCount || 0} 張)`;
                        div.onclick = () => alert('您選擇了相簿：' + album.title);
                        albumListDiv.appendChild(div);
                    });
                } else {
                    albumListDiv.innerHTML = '<div class="error">找不到相簿！請確認權限已勾選且帳號內有建立相簿資料夾。</div>';
                }
            } catch (error) {
                console.error('Error fetching albums:', error);
                document.getElementById('status').innerHTML = '<div class="error">連線失敗，請稍後再試。</div>';
            }
        }
    </script>
</body>
</html>
