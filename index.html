<script>
    // ... 前段 init 與 renderBook 保持不變 ...

    function renderBook(ids, titleText) {
        // ... 中間節點建立保持不變 ...
        
        // 封底縮圖生成邏輯：確保 onclick 傳入正確的絕對索引
        let thumbHtml = `<div style="font-size:14px; opacity:0.5; margin-bottom:15px; text-align:center;">快速跳頁</div><div class="back-grid">`;
        ids.forEach((id, i) => {
            const t = `https://res.cloudinary.com/${CONFIG.name}/image/upload/w_200,c_fill/${id}`;
            // 第 1 張圖(i=0) 對應 PageFlip 的索引 1
            // 加上 event.preventDefault() 確保點擊純淨
            thumbHtml += `
                <div class="thumb" onclick="handleThumbClick(event, ${i + 1})">
                    <img src="${t}">
                </div>`;
        });
        thumbHtml += `<div class="thumb" style="background:#fff;" onclick="window.open('${LOGO_URL}')"><img src="${LOGO_URL}"></div></div>`;
        b.innerHTML = thumbHtml;
        book.appendChild(b);

        flip = new St.PageFlip(book, { 
            width: 320, height: 480, 
            showCover: false, 
            usePortrait: true,
            drawShadow: false, 
            flippingTime: 400,
            disableFlipByClick: false,
            clickEventForward: true,
            swipeDistance: 30 // 提高滑動靈敏度
        });
        flip.loadFromHTML(document.querySelectorAll('.page'));
        
        // ... flip.on('flip') 監聽保持不變 ...
    }

    // 建立一個專門處理縮圖點擊的函數
    window.handleThumbClick = (e, targetIndex) => {
        if (e) {
            e.stopPropagation();
            e.preventDefault();
        }
        
        if (flip) {
            // 1. 取得當前狀態
            const currentState = flip.getState(); // 'read', 'flipper', 'user_fold'
            
            // 2. 如果正在翻頁中，先強制結束
            // 3. 執行絕對跳轉
            flip.turnToPage(parseInt(targetIndex));
            
            console.log("跳轉至照片索引:", targetIndex);
        }
    };

    // 為了相容性保留舊名
    window.goToPage = (n) => window.handleThumbClick(null, n);

    // ... 後段上傳與 Line 分享邏輯保持不變 ...
</script>
