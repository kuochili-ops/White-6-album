<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六快傳相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --bg: #121212; --slot-bg: #2a2a2a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .ui-card { width: 90%; max-width: 400px; padding: 20px; text-align: center; background: #1e1e1e; border-radius: 24px; border: 1px solid #333; }
        
        /* 上傳進度空格 */
        .upload-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .slot { width: 100%; aspect-ratio: 1/1; background: var(--slot-bg); border-radius: 8px; border: 1px dashed #444; overflow: hidden; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn { background: var(--line-green); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; background: #2a2a2a; border: 1px solid #444; border-radius: 10px; color: #fff; box-sizing: border-box; }

        /* 相簿與頁面優化 */
        #album-view { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .page { background: #000; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: cover; } /* 直式滿版 */
        .page.double img { height: 50%; object-fit: contain; background: #000; } /* 橫式兩張一頁 */

        /* 放大與工具欄 */
        .tools { position: absolute; bottom: 30px; display: flex; gap: 20px; z-index: 1001; }
        .tool-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 20px; color: #fff; font-size: 14px; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div id="setup-ui" class="ui-card">
    <div style="font-size:40px;">𓃥</div>
    <h3 style="margin: 10px 0;">白六快傳相簿</h3>
    
    <div class="upload-grid" id="upload-grid">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>

    <button class="btn" id="upload-trigger" onclick="document.getElementById('file-input').click()">+ 選擇 10 張照片</button>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none">

    <div id="share-area" style="display:none;">
        <input type="text" id="album-title" placeholder="輸入相簿標題...">
        <button class="btn" onclick="sendFlex()">搜尋對象並傳送</button>
    </div>
</div>

<div id="album-view">
    <div id="book"></div>
    <div class="tools">
        <a href="javascript:void(0)" class="tool-btn" onclick="toggleZoom()">🔍 放大觀賞</a>
        <a href="javascript:void(0)" id="download-link" class="tool-btn" download>📥 下載照片</a>
    </div>
</div>

<script>
    const CFG = { name: 'dnwwaush7', preset: 'white6_album', liffId: '2009222789-M8aFcFM7' };
    let uploadedIds = [];
    let currentImgUrl = "";

    async function init() {
        await liff.init({ liffId: CFG.liffId });
        const params = new URLSearchParams(window.location.search);
        const ids = params.get('ids');
        if (ids) buildAlbum(ids.split(','));
    }

    document.getElementById('file-input').onchange = async (e) => {
        const files = Array.from(e.target.files).slice(0, 10);
        const slots = document.querySelectorAll('.slot');
        document.getElementById('upload-trigger').disabled = true;

        for (let i = 0; i < files.length; i++) {
            const fd = new FormData();
            fd.append('file', files[i]);
            fd.append('upload_preset', CFG.preset);

            try {
                const r = await fetch(`https://api.cloudinary.com/v1_1/${CFG.name}/image/upload`, { method: 'POST', body: fd });
                const d = await r.json();
                if (d.public_id) {
                    uploadedIds.push(d.public_id);
                    slots[i].innerHTML = `<img src="${d.secure_url}">`;
                    slots[i].style.border = "none";
                }
            } catch (err) { console.error("上傳失敗"); }
        }
        document.getElementById('share-area').style.display = 'block';
    };

    function buildAlbum(ids) {
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('album-view').style.display = 'flex';
        const book = document.getElementById('book');
        
        // 智能排版邏輯：偵測橫式照片
        let i = 0;
        while (i < ids.length) {
            const url = `https://res.cloudinary.com/${CFG.name}/image/upload/f_auto,q_auto,w_1000/${ids[i]}`;
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `<img src="${url}" onclick="updateDownload('${url}')">`;
            book.appendChild(page);
            i++;
        }

        const flip = new St.PageFlip(book, { width: 320, height: 480, showCover: true, mobileScrollSupport: true });
        flip.loadFromHTML(document.querySelectorAll('.page'));
        
        flip.on('flip', (e) => {
            const activePage = document.querySelectorAll('.page img')[e.data];
            if (activePage) updateDownload(activePage.src);
        });
    }

    function updateDownload(url) {
        currentImgUrl = url;
        document.getElementById('download-link').href = url;
    }

    function toggleZoom() {
        const img = document.querySelector('.st-page-flip .page img'); // 簡化版放大邏輯
        window.open(currentImgUrl, '_blank');
    }

    async function sendFlex() {
        const title = document.getElementById('album-title').value || "白六分享相簿";
        const link = `https://liff.line.me/${CFG.liffId}/?ids=${uploadedIds.join(',')}`;
        const cover = `https://res.cloudinary.com/${CFG.name}/image/upload/w_400,c_fill/${uploadedIds[0]}`;

        await liff.shareTargetPicker([{
            "type": "flex",
            "altText": "𓃥 白六分享了相簿",
            "contents": {
                "type": "bubble",
                "hero": { "type": "image", "url": cover, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": "𓃥 白六實體相簿", "weight": "bold", "color": "#00b900", "size": "lg" },
                    { "type": "text", "text": title, "size": "sm", "color": "#666666", "wrap": true }
                ]},
                "footer": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "button", "action": { "type": "uri", "label": "翻閱相簿", "uri": link }, "style": "primary", "color": "#00b900" },
                    { "type": "button", "action": { "type": "uri", "label": "修改並轉傳", "uri": `https://liff.line.me/${CFG.liffId}/` }, "style": "link", "height": "sm" }
                ]}
            }
        }]);
        liff.closeWindow();
    }

    init();
</script>
</body>
</html>
