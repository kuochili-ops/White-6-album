<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六快傳相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .ui-card { width: 90%; max-width: 400px; padding: 25px; text-align: center; background: var(--card); border-radius: 28px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .slot { aspect-ratio: 1/1; background: #2a2a2a; border-radius: 12px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: #fff; box-sizing: border-box; font-size: 14px; }
        .btn { background: var(--line-green); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .spinner { width: 20px; height: 20px; border: 2px solid #444; border-top-color: var(--line-green); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 相簿檢視 */
        #album-view { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .page { background: #111; width: 100%; height: 100%; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 透明封面 (Page 0) */
        .page.cover-front { 
            background: rgba(255,255,255,0.08) !important; 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 30px;
        }
        .page.cover-front h2 { font-size: 28px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin: 0; line-height: 1.4; }

        /* 咖啡色封底 */
        .page.cover-back { 
            background: #3e2f22 !important; 
            display: flex; align-items: flex-end; justify-content: flex-end; padding: 25px; 
        }
        .page.cover-back img { width: 80px; height: auto; object-fit: contain; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        #page-num { position: fixed; bottom: 90px; color: rgba(255,255,255,0.5); font-size: 13px; z-index: 1001; }
        .tools { position: fixed; bottom: 30px; display: flex; gap: 12px; z-index: 1001; transition: opacity 0.3s; }
        .tool-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); padding: 12px 22px; border-radius: 25px; color: #fff; font-size: 14px; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); font-weight: 600; }
    </style>
</head>
<body>

<div id="setup-ui" class="ui-card">
    <div style="font-size:40px; margin-bottom:5px;">𓃥</div>
    <h3 id="ui-title">製作新相簿</h3>
    <div class="grid" id="grid"></div>
    <button class="btn" id="up-btn" onclick="document.getElementById('file-input').click()">+ 選擇照片</button>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none">

    <div id="info-area" style="display:none; margin-top:15px;">
        <input type="text" id="album-name" placeholder="相簿名稱 (顯示在封面)">
        <input type="text" id="album-note" placeholder="給對方的留言...">
        <button class="btn" style="background:#fff; color:#000;" onclick="sendToLine()">搜尋對象並傳送</button>
    </div>
</div>

<div id="album-view">
    <div id="book"></div>
    <div id="page-num">封面</div>
    <div class="tools" id="action-tools" style="opacity:0; pointer-events:none;">
        <a href="javascript:void(0)" class="tool-btn" onclick="openFull()">🔍 放大觀賞</a>
        <a href="javascript:void(0)" class="tool-btn" id="dl-link" download>📥 下載照片</a>
    </div>
</div>

<script>
    const CONFIG = { name: 'dnwwaush7', preset: 'white6_album', liffId: '2009222789-M8aFcFM7' };
    let uploadedIds = [];
    let currentImgUrl = "";

    async function init() {
        await liff.init({ liffId: CONFIG.liffId });
        const params = new URLSearchParams(window.location.search);
        const ids = params.get('ids');
        const name = params.get('name');
        const note = params.get('note');
        const mode = params.get('mode');

        if (ids && mode !== 'forward') {
            renderBook(ids.split(','), decodeURIComponent(name || "白六相簿"));
        } else if (mode === 'forward') {
            // 轉傳模式：保留留言但顯示製作介面
            document.getElementById('ui-title').innerText = "轉傳分享相簿";
            document.getElementById('album-note').value = decodeURIComponent(note || "");
            document.getElementById('album-name').value = decodeURIComponent(name || "");
            uploadedIds = ids.split(',');
            showGridPreview();
        }
    }

    // 前端壓縮瘦身
    async function compressImage(file) {
        if (file.size < 1024 * 1024) return file;
        return new Promise(res => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 1200 / Math.max(img.width, img.height);
                canvas.width = img.width * (scale < 1 ? scale : 1);
                canvas.height = img.height * (scale < 1 ? scale : 1);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(blob => res(new File([blob], file.name, {type: "image/jpeg"})), 'image/jpeg', 0.8);
            };
        });
    }

    document.getElementById('file-input').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        
        const grid = document.getElementById('grid');
        const btn = document.getElementById('up-btn');
        grid.innerHTML = ""; uploadedIds = [];
        btn.disabled = true; btn.innerText = "處理中...";

        for (let i = 0; i < files.length; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot'; slot.innerHTML = '<div class="spinner"></div>';
            grid.appendChild(slot);
            
            const compressed = await compressImage(files[i]);
            const fd = new FormData();
            fd.append('file', compressed);
            fd.append('upload_preset', CONFIG.preset);
            
            const r = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.name}/image/upload`, { method: 'POST', body: fd });
            const d = await r.json();
            if (d.public_id) {
                uploadedIds.push(d.public_id);
                slot.innerHTML = `<img src="${d.secure_url}">`;
            }
        }
        btn.innerText = `已加入 ${uploadedIds.length} 張照片`;
        document.getElementById('info-area').style.display = 'block';
    };

    function showGridPreview() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        uploadedIds.forEach(id => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<img src="https://res.cloudinary.com/${CONFIG.name}/image/upload/w_200,c_fill/${id}">`;
            grid.appendChild(slot);
        });
        document.getElementById('info-area').style.display = 'block';
    }

    function renderBook(ids, titleText) {
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('album-view').style.display = 'flex';
        const book = document.getElementById('book');
        const urls = ids.map(id => `https://res.cloudinary.com/${CONFIG.name}/image/upload/f_auto,q_auto,w_1000/${id}`);

        // Page 0: 透明封面
        const f = document.createElement('div');
        f.className = 'page cover-front';
        f.innerHTML = `<h2>${titleText}</h2>`;
        book.appendChild(f);

        // 內頁
        urls.forEach(u => {
            const p = document.createElement('div');
            p.className = 'page';
            p.innerHTML = `<img src="${u}">`;
            book.appendChild(p);
        });

        // 封底
        const b = document.createElement('div');
        b.className = 'page cover-back';
        b.innerHTML = `<img src="IMG_6604 2.png">`;
        book.appendChild(b);

        const flip = new St.PageFlip(book, { width: 320, height: 480, showCover: true, hardcover: true });
        flip.loadFromHTML(document.querySelectorAll('.page'));
        
        flip.on('flip', (e) => {
            const idx = e.data;
            const tools = document.getElementById('action-tools');
            const pageNum = document.getElementById('page-num');
            
            if (idx === 0) {
                pageNum.innerText = "封面";
                tools.style.opacity = "0"; tools.style.pointerEvents = "none";
            } else if (idx > 0 && idx <= urls.length) {
                pageNum.innerText = `${idx} / ${urls.length}`;
                tools.style.opacity = "1"; tools.style.pointerEvents = "auto";
                currentImgUrl = urls[idx - 1];
                document.getElementById('dl-link').href = currentImgUrl;
            } else {
                pageNum.innerText = "封底";
                tools.style.opacity = "0"; tools.style.pointerEvents = "none";
            }
        });
    }

    function openFull() { window.open(currentImgUrl, '_blank'); }

    async function sendToLine() {
        const name = document.getElementById('album-name').value || "未命名相簿";
        const note = document.getElementById('album-note').value || "送你一份精彩回憶";
        const baseLink = `https://liff.line.me/${CONFIG.liffId}/?ids=${uploadedIds.join(',')}&name=${encodeURIComponent(name)}&note=${encodeURIComponent(note)}`;
        const coverUrl = `https://res.cloudinary.com/${CONFIG.name}/image/upload/w_500,c_fill/${uploadedIds[0]}`;

        await liff.shareTargetPicker([{
            "type": "flex", "altText": `𓃥 ${name} 相簿分享`,
            "contents": {
                "type": "bubble",
                "hero": { "type": "image", "url": coverUrl, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                "body": { "type": "box", "layout": "vertical", "contents": [
                    { "type": "text", "text": `𓃥 ${name}`, "weight": "bold", "color": "#00b900", "size": "xl" },
                    { "type": "text", "text": note, "size": "md", "color": "#555555", "wrap": true, "margin": "md" }
                ]},
                "footer": { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                    { "type": "button", "action": { "type": "uri", "label": "翻閱相簿", "uri": baseLink }, "style": "primary", "color": "#00b900" },
                    { "type": "box", "layout": "horizontal", "spacing": "sm", "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "轉傳分享", "uri": baseLink + "&mode=forward" }, "style": "secondary", "height": "sm" },
                        { "type": "button", "action": { "type": "uri", "label": "製作新相簿", "uri": `https://liff.line.me/${CONFIG.liffId}/` }, "style": "link", "height": "sm" }
                    ]}
                ]}
            }
        }]);
        liff.closeWindow();
    }
    init();
</script>
</body>
</html>
