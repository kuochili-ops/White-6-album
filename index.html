<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 40px 20px; }
        .logo { font-size: 60px; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; max-width: 300px; margin: 10px 0; }
        #album-view { display: none; width: 100vw; height: 100vh; background: #222; }
        .page { background: #fff; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; }
        .page img { max-width: 90%; max-height: 90%; object-fit: contain; }
    </style>
</head>
<body>

<div id="setup-ui" class="container">
    <div class="logo">𓃥</div>
    <h2>白六快傳相簿</h2>
    <p style="color:#888;">無需下載照片，直接選取即可分享</p>
    
    <button class="btn" onclick="choosePhotos()">從 LINE 選取照片</button>
    
    <div id="share-box" style="display:none; margin-top:20px;">
        <input type="text" id="user-msg" placeholder="想說的話..." style="width:70%; padding:10px; border-radius:10px;">
        <button class="btn" onclick="sendAlbum()">製作並分享相簿</button>
    </div>
</div>

<div id="album-view">
    <div id="my-album"></div>
</div>

<script>
    let selectedImages = [];
    const LIFF_ID = '2009222789-M8aFcFM7';

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        const params = new URLSearchParams(window.location.search);
        if (params.get('imgs')) {
            renderBook(decodeURIComponent(params.get('imgs')).split(','), params.get('msg'));
        }
    }

    // 方案二核心：呼叫 LINE 相簿選擇器
    async function choosePhotos() {
        // 如果 LIFF 支援選圖 API (部分環境需使用標準 input 備援)
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.multiple = true;
        fileInput.accept = 'image/*';
        
        fileInput.onchange = e => {
            const files = Array.from(e.target.files);
            // 這裡模擬將照片轉為 DataURL (實際生產環境建議傳至 Cloudinary 或 Imgur)
            Promise.all(files.map(f => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(f);
            }))).then(results => {
                selectedImages = results;
                document.getElementById('share-box').style.display = 'block';
                alert(`成功選取 ${results.length} 張照片！`);
            });
        };
        fileInput.click();
    }

    async function sendAlbum() {
        const msg = document.getElementById('user-msg').value || "送你一本實體感相簿";
        // 注意：圖片過大會導致 URL 過長，實務上建議上傳至空間拿取短網址
        alert("正在產生分享連結... (照片較多時請稍候)");
        
        // 分享 Flex Message (邏輯與之前相同)
        if (liff.isApiAvailable('shareTargetPicker')) {
            liff.shareTargetPicker([{
                "type": "flex",
                "altText": "𓃥 白六分享了相簿",
                "contents": { /* Flex Message 內容 */ }
            }]);
        }
    }

    function renderBook(imgs, msg) {
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('album-view').style.display = 'flex';
        // 翻頁邏輯同前...
    }

    init();
</script>
</body>
</html>
