<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六分享相簿 APP</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { background: #2c2c2c; padding: 30px; border-radius: 20px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background-color: #00b900; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; margin: 20px 0; width: 100%; }
        .btn:hover { background-color: #009900; transform: scale(1.02); }
        .album-item { background: #3d3d3d; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; border: 1px solid #555; transition: 0.2s; }
        .album-item:hover { border-color: #00b900; background: #444; }
        .error { color: #ff6b6b; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="margin-bottom: 5px;">𓃥</h1>
        <h2 style="margin-top: 0;">白六分享相簿</h2>
        <p style="color: #aaa;">請登入以開啟您的相簿清單</p>

        <button id="loginBtn" class="btn" onclick="login()">登入 Google 帳號</button>
        
        <div id="status"></div>
        <div id="album-list"></div>
    </div>

    <script>
        let accessToken = '';
        // 已填入您提供的 Client ID
        const CLIENT_ID = '926483239392-mbn8nv60mgh6kk4s5joaemnhao5kv46p.apps.googleusercontent.com';

        // 初始化 Token Client
        const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
            callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                    accessToken = tokenResponse.access_token;
                    document.getElementById('status').innerHTML = '<p style="color: #00ff00;">連線成功！正在取得相簿...</p>';
                    document.getElementById('loginBtn').style.display = 'none';
                    fetchAlbums();
                }
            },
        });

        function login() {
            // 強制要求同意畫面，確保勾選框出現
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        async function fetchAlbums() {
            try {
                const response = await fetch('https://photoslibrary.googleapis.com/v1/albums?pageSize=50', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                const data = await response.json();
                const albumListDiv = document.getElementById('album-list');
                albumListDiv.innerHTML = '';

                if (data.albums && data.albums.length > 0) {
                    data.albums.forEach(album => {
                        const div = document.createElement('div');
                        div.className = 'album-item';
                        div.innerHTML = `<strong>${album.title}</strong><br><small>${album.mediaItemsCount || 0} 張照片</small>`;
                        div.onclick = () => alert('已選擇相簿：' + album.title);
                        albumListDiv.appendChild(div);
                    });
                } else {
                    albumListDiv.innerHTML = '<div class="error">找不到相簿！<br>請確認剛才登入時「查看 Google 相簿」有打勾。</div>';
                }
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('status').innerHTML = '<div class="error">API 請求失敗，請檢查網路。</div>';
            }
        }
    </script>
</body>
</html>
