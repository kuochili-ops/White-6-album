<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六快傳相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #121212; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .ui-card { width: 90%; max-width: 400px; padding: 40px 20px; text-align: center; background: #1e1e1e; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 70px; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin: 10px 0; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #share-area { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #2a2a2a; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        
        /* 翻頁相簿專用樣式 */
        #album-view { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 100; align-items: center; justify-content: center; }
        .page { background: #fdfdfd; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .page img { max-width: 95%; max-height: 95%; object-fit: contain; }
    </style>
</head>
<body>

<div id="setup-ui" class="ui-card">
    <div class="logo">𓃥</div>
    <h2 style="margin:0 0 10px 0;">白六快傳相簿</h2>
    <p style="color:#888; font-size:14px; margin-bottom:30px;">選取手機照片，即刻生成精美翻頁書</p>
    
    <button class="btn" id="upload-trigger" onclick="document.getElementById('file-selector').click()">從手機選取照片</button>
    <input type="file" id="file-selector" multiple accept="image/*" style="display:none">

    <div id="share-area">
        <input type="text" id="album-msg" placeholder="寫下這份回憶的標題...">
        <button class="btn" style="background:#fff; color:#000;" onclick="shareAlbum()">傳送給 LINE 好友</button>
    </div>
</div>

<div id="album-view">
    <div id="flip-book"></div>
</div>

<script>
    // 這裡使用你提供的 Cloudinary 資訊
    const CLOUD_CONFIG = {
        name: 'dnwwaush7',
        preset: 'white6_album',
        liffId: '2009222789-M8aFcFM7'
    };

    let uploadedUrls = [];

    async function initLiff() {
        await liff.init({ liffId: CLOUD_CONFIG.liffId });
        const params = new URLSearchParams(window.location.search);
        if (params.get('imgs')) {
            showAlbum(decodeURIComponent(params.get('imgs')).split(','));
        }
    }

    // 處理照片選取與上傳
    document.getElementById('file-selector').onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        const btn = document.getElementById('upload-trigger');
        btn.disabled = true;
        btn.innerText = "上傳優化中...";

        for (let file of files) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUD_CONFIG.preset);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_CONFIG.name}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.secure_url) {
                    // 自動優化：寬度 1000px, 自動格式, 自動品質
                    const optUrl = data.secure_url.replace('/upload/', '/upload/w_1000,f_auto,q_auto/');
                    uploadedUrls.push(optUrl);
                }
            } catch (err) { console.error("Upload Error", err); }
        }

        btn.innerText = `已選取 ${uploadedUrls.length} 張照片`;
        document.getElementById('share-area').style.display = 'block';
    };

    // 使用 LINE ShareTargetPicker 分享相簿
    async function shareAlbum() {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const imgsParam = encodeURIComponent(uploadedUrls.join(','));
        const finalLink = `https://liff.line.me/${CLOUD_CONFIG.liffId}/?imgs=${imgsParam}`;
        const title = document.getElementById('album-msg').value || "送你一本實體感相簿";

        if (liff.isApiAvailable('shareTargetPicker')) {
            await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "𓃥 白六分享了實體感相簿",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": uploadedUrls[0], "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": {
                        "type": "box", "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "𓃥 白六分享相簿", "weight": "bold", "size": "xl", "color": "#00b900" },
                            { "type": "text", "text": title, "wrap": true, "margin": "md", "color": "#555555" }
                        ]
                    },
                    "footer": {
                        "type": "box", "layout": "vertical",
                        "contents": [{ "type": "button", "action": { "type": "uri", "label": "立即翻閱", "uri": finalLink }, "style": "primary", "color": "#00b900" }]
                    }
                }
            }]);
            liff.closeWindow();
        }
    }

    // 渲染翻頁相簿
    function showAlbum(imgs) {
        document.getElementById('setup-ui').style.display = 'none';
        const view = document.getElementById('album-view');
        view.style.display = 'flex';
        
        const book = document.getElementById('flip-book');
        imgs.forEach(url => {
            const page = document.createElement('div');
            page.className = 'page';
            page.innerHTML = `<img src="${url}">`;
            book.appendChild(page);
        });

        const flip = new St.PageFlip(book, {
            width: 300, height: 450,
            showCover: true, mobileScrollSupport: true
        });
        flip.loadFromHTML(document.querySelectorAll('.page'));
    }

    initLiff();
</script>
</body>
</html>
