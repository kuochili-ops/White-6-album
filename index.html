<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六分享相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #00b900; --bg: #121212; --card: #222222; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #setup-ui { width: 100%; max-width: 350px; background: var(--card); padding: 25px; border-radius: 20px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .preview-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-upload { background: #444; color: #fff; }
        .btn-share { background: var(--primary); color: #fff; }
        input { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #444; background: #000; color: #fff; margin-top: 10px; box-sizing: border-box; }
        #album-view { display: none; width: 100vw; height: 100vh; background: #000; }
        .page { background: #fff; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; }
        .page img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div id="setup-ui-container" class="container">
    <div id="setup-ui">
        <div style="font-size: 40px;">𓃥</div>
        <h2>白六分享相簿</h2>
        <p style="color:#888; font-size:12px;">建議選取 3-5 張照片以確保發送成功</p>
        
        <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
        <button class="btn btn-upload" onclick="document.getElementById('file-input').click()">+ 選取照片</button>
        <div id="preview-grid" class="preview-grid"></div>
        
        <input type="text" id="user-msg" placeholder="輸入想說的話...">
        <button id="share-btn" class="btn btn-share" disabled onclick="sendFlexMessage()">分享給好友</button>
    </div>
</div>

<div id="album-view"><div id="my-album"></div></div>

<script>
    const LIFF_ID = '2009222789-M8aFcFM7';
    let compressedPhotos = [];

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        const params = new URLSearchParams(window.location.search);
        if (params.get('imgs')) renderBook(JSON.parse(decodeURIComponent(params.get('imgs'))), decodeURIComponent(params.get('msg') || ""));
    }

    document.getElementById('file-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        const previewGrid = document.getElementById('preview-grid');
        previewGrid.innerHTML = '';
        compressedPhotos = [];

        for (const file of files) {
            const base64 = await compressImage(file);
            compressedPhotos.push(base64);
            const img = document.createElement('img');
            img.src = base64;
            previewGrid.appendChild(img);
        }
        document.getElementById('share-btn').disabled = compressedPhotos.length === 0;
    });

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // 縮小尺寸至 400px
                    const scale = 400 / Math.max(img.width, img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); // 壓縮品質 0.6
                };
            };
        });
    }

    window.sendFlexMessage = async function() {
        const msg = document.getElementById('user-msg').value || "送你一本相簿";
        const imgsData = encodeURIComponent(JSON.stringify(compressedPhotos));
        const shareUrl = `https://liff.line.me/${LIFF_ID}?imgs=${imgsData}&msg=${encodeURIComponent(msg)}`;

        if (shareUrl.length > 30000) {
            alert("照片太多或太大，請減少至 3 張再試一次！");
            return;
        }

        if (liff.isApiAvailable('shareTargetPicker')) {
            await liff.shareTargetPicker([{
                "type": "flex", "altText": "𓃥 白六分享相簿",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": "https://img.icons8.com/color/144/album.png", "size": "xl", "aspectMode": "fit" },
                    "body": { "type": "box", "layout": "vertical", "contents": [{ "type": "text", "text": "𓃥 白六送來了相簿", "weight": "bold", "color": "#00b900" }, { "type": "text", "text": msg, "size": "sm" }] },
                    "footer": { "type": "box", "layout": "vertical", "contents": [{ "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "點我翻閱", "uri": shareUrl } }] }
                }
            }]);
            liff.closeWindow();
        }
    };

    function renderBook(imgs, msg) {
        document.getElementById('setup-ui-container').style.display = 'none';
        document.getElementById('album-view').style.display = 'flex';
        const albumEl = document.getElementById('my-album');
        let html = `<div class="page"><div><h2>𓃥 白六相簿</h2><p>${msg}</p></div></div>`;
        imgs.forEach(src => { html += `<div class="page"><img src="${src}"></div>`; });
        albumEl.innerHTML = html + `<div class="page"><h3>THE END</h3></div>`;
        new St.PageFlip(albumEl, { width: 300, height: 450, size: "stretch", showCover: true }).loadFromHTML(document.querySelectorAll(".page"));
    }

    init();
</script>
</body>
</html>
