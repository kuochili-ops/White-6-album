<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𓃥 白六快傳相簿</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #00b900; --bg: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .ui-card { width: 85%; max-width: 360px; padding: 25px; text-align: center; background: #1e1e1e; border-radius: 20px; border: 1px solid #333; }
        .btn { background: var(--line-green); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }
        #share-area { display: none; margin-top: 20px; animation: fadeIn 0.3s; }
        .preview-box { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; flex-shrink: 0; border: 1px solid #444; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        
        /* 翻頁顯示區強化 */
        #album-view { display: none; width: 100vw; height: 100vh; background: #000; position: fixed; top: 0; left: 0; z-index: 9999; }
        .flip-container { width: 90vw; height: 80vh; max-width: 400px; }
        .page { background: #fff; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .page img { max-width: 100%; max-height: 100%; object-fit: contain; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="setup-ui" class="ui-card">
    <div style="font-size:50px;">𓃥</div>
    <h3 style="margin:10px 0;">白六快傳相簿</h3>
    <button class="btn" id="upload-btn" onclick="document.getElementById('file-input').click()">+ 挑選相簿照片</button>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none">

    <div id="share-area">
        <div class="preview-box" id="mini-preview"></div>
        <input type="text" id="album-title" placeholder="這份回憶的標題...">
        <button class="btn" style="background:#fff; color:#000;" onclick="executeShare()">搜尋對象並傳送</button>
    </div>
</div>

<div id="album-view">
    <div class="flip-container" id="flip-container"></div>
</div>

<script>
    const CONFIG = {
        name: 'dnwwaush7',
        preset: 'white6_album',
        liffId: '2009222789-M8aFcFM7'
    };

    let photoIds = [];

    async function init() {
        try {
            await liff.init({ liffId: CONFIG.liffId });
            const params = new URLSearchParams(window.location.search);
            const ids = params.get('ids');
            if (ids) {
                const urls = ids.split(',').map(id => `https://res.cloudinary.com/${CONFIG.name}/image/upload/f_auto,q_auto,w_800/${id}`);
                startAlbum(urls);
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('file-input').onchange = async (e) => {
        const files = Array.from(e.target.files);
        const btn = document.getElementById('upload-btn');
        btn.innerText = "正在傳送至雲端...";
        btn.disabled = true;

        for (let file of files) {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', CONFIG.preset);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.name}/image/upload`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.public_id) {
                    photoIds.push(data.public_id);
                    const img = document.createElement('img');
                    img.src = data.secure_url; img.className = 'thumb';
                    document.getElementById('mini-preview').appendChild(img);
                }
            } catch (err) { alert("上傳失敗，請檢查網路"); }
        }
        btn.innerText = "上傳完畢";
        document.getElementById('share-area').style.display = 'block';
    };

    async function executeShare() {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const title = document.getElementById('album-title').value || "送你一本白六相簿";
        const link = `https://liff.line.me/${CONFIG.liffId}/?ids=${encodeURIComponent(photoIds.join(','))}`;
        const cover = `https://res.cloudinary.com/${CONFIG.name}/image/upload/w_400,c_fill/${photoIds[0]}`;

        try {
            const res = await liff.shareTargetPicker([{
                "type": "flex",
                "altText": "𓃥 白六分享了實體感相簿",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": cover, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "text", "text": "𓃥 白六實體相簿", "weight": "bold", "color": "#00b900", "size": "lg" },
                        { "type": "text", "text": title, "size": "sm", "color": "#666666", "wrap": true }
                    ]},
                    "footer": { "type": "box", "layout": "vertical", "contents": [
                        { "type": "button", "action": { "type": "uri", "label": "立即翻閱", "uri": link }, "style": "primary", "color": "#00b900" }
                    ]}
                }
            }]);
            if (res) liff.closeWindow();
        } catch (err) {
            alert("傳送異常，請截圖此訊息回報：\n" + JSON.stringify(err));
        }
    }

    function startAlbum(urls) {
        document.getElementById('setup-ui').style.display = 'none';
        const view = document.getElementById('album-view');
        view.style.display = 'flex';
        
        const container = document.getElementById('flip-container');
        container.innerHTML = `<div id="book"></div>`;
        const bookEl = document.getElementById('book');

        urls.forEach(u => {
            const p = document.createElement('div');
            p.className = 'page';
            p.innerHTML = `<img src="${u}">`;
            bookEl.appendChild(p);
        });

        const flip = new St.PageFlip(bookEl, {
            width: 300, height: 450,
            showCover: true,
            mobileScrollSupport: true,
            usePortrait: true
        });
        flip.loadFromHTML(document.querySelectorAll('.page'));
    }

    init();
</script>
</body>
</html>
