<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>𓃥 白六分享相簿 APP</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { background-color: #00b900; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>𓃥 白六分享相簿</h1>
    <button class="btn" id="loginBtn" onclick="login()">登入 Google 帳號</button>
    <div id="status"></div>

    <script>
        let client;
        const CLIENT_ID = '您的用戶端ID.apps.googleusercontent.com'; // <--- 請確認這串沒錯

        function login() {
            // 檢查 google 物件是否載入
            if (typeof google === 'undefined') {
                alert('Google 服務尚未載入，請稍候再試或重新整理網頁。');
                return;
            }

            try {
                client = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
                    callback: (response) => {
                        if (response.access_token) {
                            console.log("登入成功");
                            document.getElementById('status').innerText = '連線成功，正在讀取相簿...';
                            // 這裡可以接續 fetchAlbums() 的邏輯
                        }
                    },
                });
                // 強制跳出視窗
                client.requestAccessToken({ prompt: 'consent' });
            } catch (err) {
                console.error(err);
                alert('啟動登入失敗：' + err.message);
            }
        }
    </script>
</body>
</html>
