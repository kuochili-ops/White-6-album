<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六分享相簿 APP</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    
    <style>
        :root { --primary: #00b900; --bg: #121212; --card: #222222; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        #setup-ui { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        .album-list { max-height: 250px; overflow-y: auto; background: #111; border-radius: 10px; margin: 15px 0; text-align: left; border: 1px solid #444; }
        .album-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .album-item:hover { background: #333; }
        .album-item img { width: 45px; height: 45px; object-fit: cover; margin-right: 12px; border-radius: 6px; }
        input, button { width: 100%; padding: 14px; border-radius: 30px; border: none; font-size: 16px; margin-top: 10px; box-sizing: border-box; }
        input { background: #000; color: #fff; border: 1px solid #444; }
        button { background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        #album-view { display: none; width: 100vw; height: 100vh; align-items: center; justify-content: center; background: #000; }
        .page { background: #fff; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .page img { width: 90%; height: 85%; object-fit: contain; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="setup-ui-container" class="container">
    <div id="setup-ui">
        <div class="logo">𓃥</div>
        <h2 style="margin:0 0 10px 0;">白六分享相簿</h2>
        
        <div id="auth-box">
            <p style="color:#aaa; font-size:14px;">點擊登入以授權讀取相簿目錄</p>
            <button onclick="handleGoogleAuth()">登入 Google 帳號</button>
        </div>

        <div id="selector-box" class="hidden">
            <p id="status-text" style="font-size:14px; color:var(--primary);">連線成功！</p>
            <div id="album-list" class="album-list">正在搜尋相簿...</div>
            <input type="text" id="user-msg" placeholder="想對朋友說的話...">
            <button id="share-btn" disabled onclick="sendFlexMessage()">分享這本相簿</button>
        </div>
    </div>
</div>

<div id="album-view">
    <div id="my-album"></div>
</div>

<script type="module">
    import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

    const CONFIG = {
        CLIENT_ID: '926483239392-mbn8nv60mgh6kk4s5joaemnhao5kv46p.apps.googleusercontent.com',
        LIFF_ID: '2009222789-M8aFcFM7',
        // 確保 Scope 字串完全正確且無空格
        SCOPE: 'https://www.googleapis.com/auth/photoslibrary.readonly'
    };

    let googleToken = '';
    let selectedPhotos = [];

    async function init() {
        try {
            await liff.init({ liffId: CONFIG.LIFF_ID });
            const params = new URLSearchParams(window.location.search);
            const imgs = params.get('imgs');
            if (imgs) renderBook(decodeURIComponent(imgs).split(','), decodeURIComponent(params.get('msg') || ""));
        } catch (e) { console.error(e); }
    }

    // --- 修改重點：強制彈出同意畫面 ---
    window.handleGoogleAuth = function() {
        if (typeof google === 'undefined') return alert("SDK 加載中，請稍後");
        const client = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.CLIENT_ID,
            scope: CONFIG.SCOPE,
            prompt: 'consent', // 強制彈出同意畫面，解決 insufficient scopes 問題
            callback: (res) => {
                if (res.access_token) {
                    googleToken = res.access_token;
                    loadAlbums();
                }
            },
        });
        client.requestAccessToken();
    };

    async function loadAlbums() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('selector-box').classList.remove('hidden');
        const listEl = document.getElementById('album-list');
        listEl.innerHTML = '正在搜尋相簿...';
        
        try {
            const res = await fetch('https://photoslibrary.googleapis.com/v1/albums?pageSize=50', {
                headers: { 'Authorization': `Bearer ${googleToken}` }
            });
            const data = await res.json();

            if (data.error) {
                // 如果看到紅字，這行會直接顯示 Google 回傳的真實原因
                alert("Google API 拒絕讀取：" + data.error.message);
                listEl.innerHTML = `<p style="padding:10px; color:red;">錯誤: ${data.error.message}</p>`;
                return;
            }

            listEl.innerHTML = '';
            if (data.albums && data.albums.length > 0) {
                data.albums.forEach(album => {
                    const div = document.createElement('div');
                    div.className = 'album-item';
                    div.innerHTML = `<img src="${album.coverPhotoBaseUrl}=w100-h100-c"><div><strong>${album.title}</strong><br><small>${album.mediaItemsCount} 張</small></div>`;
                    div.onclick = () => selectAlbum(album.id);
                    listEl.appendChild(div);
                });
            } else {
                listEl.innerHTML = '<p style="padding:10px;">找不到相簿！<br>API 僅能讀取您手動建立的「相簿」資料夾，而非原始照片流。</p>';
            }
        } catch (e) { listEl.innerHTML = '網路連線失敗'; }
    }

    async function selectAlbum(id) {
        const res = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:search', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ albumId: id, pageSize: 20 })
        });
        const data = await res.json();
        selectedPhotos = data.mediaItems ? data.mediaItems.map(item => item.baseUrl) : [];
        if (selectedPhotos.length > 0) {
            document.getElementById('share-btn').disabled = false;
            alert(`已選取 ${selectedPhotos.length} 張照片，準備好可以分享囉！`);
        }
    }

    window.sendFlexMessage = async function() {
        const msg = document.getElementById('user-msg').value || "送你一本相簿";
        const shareUrl = `https://liff.line.me/${CONFIG.LIFF_ID}?imgs=${encodeURIComponent(selectedPhotos.join(','))}&msg=${encodeURIComponent(msg)}`;
        
        if (liff.isApiAvailable('shareTargetPicker')) {
            await liff.shareTargetPicker([{
                "type": "flex", "altText": "𓃥 白六分享相簿",
                "contents": {
                    "type": "bubble",
                    "hero": { "type": "image", "url": selectedPhotos[0], "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" },
                    "body": { "type": "box", "layout": "vertical", "contents": [{ "type": "text", "text": "𓃥 白六分享相簿", "weight": "bold", "color": "#00b900" }, { "type": "text", "text": msg, "size": "sm" }] },
                    "footer": { "type": "box", "layout": "vertical", "contents": [{ "type": "button", "style": "primary", "color": "#00b900", "action": { "type": "uri", "label": "點我翻閱", "uri": shareUrl } }] }
                }
            }]);
            liff.closeWindow();
        }
    };

    function renderBook(imgs, msg) {
        document.getElementById('setup-ui-container').style.display = 'none';
        const view = document.getElementById('album-view');
        view.style.display = 'flex';
        const albumEl = document.getElementById('my-album');

        let html = `<div class="page" data-density="hard"><div style="text-align:center; padding:20px;"><h2>𓃥 白六相簿</h2><p>${msg}</p></div></div>`;
        imgs.forEach(url => {
            html += `<div class="page"><a href="${url}=d" target="_blank"><img src="${url}=w1000"></a></div>`;
        });
        albumEl.innerHTML = html + `<div class="page" data-density="hard"><h3>THE END</h3></div>`;

        const pageFlip = new St.PageFlip(albumEl, { width: 400, height: 600, size: "stretch", showCover: true });
        pageFlip.loadFromHTML(document.querySelectorAll(".page"));

        new PhotoSwipeLightbox({ gallery: '#my-album', children: 'a', pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js') }).init();
    }

    init();
</script>
</body>
</html>
