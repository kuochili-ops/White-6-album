<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𓃥 白六分享相簿 APP</title>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .btn { background-color: #00b900; color: white; border: none; padding: 16px 32px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; margin: 20px 0; font-weight: bold; }
        .album-item { background: #333; padding: 20px; margin: 12px 0; border-radius: 15px; cursor: pointer; border: 1px solid #444; transition: 0.3s; text-align: left; }
        .album-item:hover { border-color: #00b900; background: #3d3d3d; }
        .album-title { font-size: 18px; display: block; margin-bottom: 5px; }
        .album-count { color: #888; font-size: 14px; }
        
        #photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .photo-card { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #222; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; display: none; }
        .back-btn { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .loading { color: #00b900; margin: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-size: 40px; margin-bottom: 10px;">𓃥</h1>
        <h2 id="main-title">白六分享相簿</h2>
        
        <button id="loginBtn" class="btn" onclick="login()">登入 Google 帳號</button>
        
        <div id="nav" class="nav-bar">
            <button class="back-btn" onclick="showAlbums()">← 返回列表</button>
            <span id="current-album-name"></span>
        </div>

        <div id="status"></div>
        <div id="album-list"></div>
        <div id="photo-grid"></div>
    </div>

    <script>
        let accessToken = '';
        const CLIENT_ID = '926483239392-mbn8nv60mgh6kk4s5joaemnhao5kv46p.apps.googleusercontent.com';

        const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
            callback: (tokenResponse) => {
                if (tokenResponse.access_token) {
                    accessToken = tokenResponse.access_token;
                    document.getElementById('loginBtn').style.display = 'none';
                    fetchAlbums();
                }
            },
        });

        function login() { 
            tokenClient.requestAccessToken({ prompt: 'consent' }); 
        }

        // 1. 抓取所有相簿
        async function fetchAlbums() {
            document.getElementById('status').innerHTML = '<p class="loading">正在搜尋您的相簿...</p>';
            try {
                const response = await fetch('https://photoslibrary.googleapis.com/v1/albums?pageSize=50', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                const listDiv = document.getElementById('album-list');
                listDiv.innerHTML = '';
                document.getElementById('status').innerHTML = '';

                if (data.albums && data.albums.length > 0) {
                    data.albums.forEach(album => {
                        const div = document.createElement('div');
                        div.className = 'album-item';
                        div.innerHTML = `
                            <span class="album-title">${album.title}</span>
                            <span class="album-count">${album.mediaItemsCount || 0} 張照片</span>
                        `;
                        div.onclick = () => fetchPhotos(album.id, album.title);
                        listDiv.appendChild(div);
                    });
                } else {
                    document.getElementById('status').innerHTML = '<p style="color: #ff6b6b;">找不到相簿！<br>請確認您的 Google 相簿中確實有建立「相簿」而非只有照片流。</p>';
                }
            } catch (err) {
                document.getElementById('status').innerText = '讀取失敗，請重新整理。';
            }
        }

        // 2. 抓取特定相簿內的照片
        async function fetchPhotos(albumId, title) {
            document.getElementById('album-list').style.display = 'none';
            document.getElementById('nav').style.display = 'flex';
            document.getElementById('current-album-name').innerText = title;
            document.getElementById('status').innerHTML = '<p class="loading">正在讀取照片...</p>';
            
            try {
                const response = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems:search', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ albumId: albumId, pageSize: 50 })
                });
                
                const data = await response.json();
                const grid = document.getElementById('photo-grid');
                grid.innerHTML = '';
                document.getElementById('status').innerHTML = '';

                if (data.mediaItems && data.mediaItems.length > 0) {
                    data.mediaItems.forEach(item => {
                        const img = document.createElement('img');
                        // 使用 =w400 來取得較清晰的縮圖
                        img.src = `${item.baseUrl}=w400-h400-c`; 
                        img.className = 'photo-card';
                        grid.appendChild(img);
                    });
                } else {
                    grid.innerHTML = '<p>此相簿內目前沒有照片。</p>';
                }
            } catch (err) {
                document.getElementById('status').innerText = '無法載入照片。';
            }
        }

        function showAlbums() {
            document.getElementById('album-list').style.display = 'block';
            document.getElementById('photo-grid').innerHTML = '';
            document.getElementById('nav').style.display = 'none';
            document.getElementById('status').innerHTML = '';
        }
    </script>
</body>
</html>
